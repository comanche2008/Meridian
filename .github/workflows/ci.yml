name: CI

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Verify modules
        run: go mod verify

      - name: Test with race detector
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

      - name: Security lint
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.28.0
          gosec -quiet -severity medium -confidence medium ./...

      - name: Validate frontend and installer syntax
        run: |
          find web/static/js -name '*.js' -print0 | xargs -0 -n1 node --check
          bash -n install.sh
          bash -n tests/install_test.sh
          shellcheck install.sh tests/install_test.sh
          bash tests/install_test.sh

      - name: Build
        run: go build -trimpath -buildvcs=false -o meridian .
